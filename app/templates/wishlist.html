{% extends "base.html" %}
{% block content %}
<div class="container" style="padding-top:32px;padding-bottom:80px">
  <h1 style="font-size:32px;margin-bottom:32px">Избранное</h1>
  <div class="empty-page" id="wish-empty" style="display:none">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    <p>В избранном пока ничего нет</p>
    <a href="/catalog" class="btn-primary" style="display:inline-flex;margin-top:16px">Перейти в каталог</a>
  </div>
  <div class="products-grid" id="wish-grid" data-view="list"></div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
  wishlistStore.load();
  const grid = document.getElementById('wish-grid');
  const empty = document.getElementById('wish-empty');
  if (!wishlistStore.items.length) {
    empty.style.display = 'block'; grid.style.display = 'none';
  } else {
    wishlistStore.items.forEach(p => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <div class="product-img-wrap" style="background:var(--bg)">
          ${p.image ? `<img src="${p.image}" alt="${p.name}">` : '<div class="product-no-img"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></div>'}
        </div>
        <div class="product-body">
          <div class="product-main-info">
            <div class="product-name"><a href="/catalog/${p.slug || '#'}">${p.name}</a></div>
            ${p.sku ? `<div class="product-sku">Арт.: ${p.sku}</div>` : ''}
          </div>
          <div class="product-price-row">
            <div class="product-price">${formatPrice(p.price)} ₽</div>
            <div class="product-actions">
              <button class="product-add-btn" onclick="document.body._x_dataStack[0].cart.add({id:${p.id},name:'${p.name.replace(/'/g,"\\'")}',sku:'${p.sku||''}',price:${p.price}})" title="В корзину">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
              </button>
              <button class="product-action-btn active-wish" onclick="wishlistStore.toggle({id:${p.id},name:'${p.name.replace(/'/g,"\\'")}',price:${p.price}});this.closest('.product-card').remove()" title="Удалить из избранного">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </button>
            </div>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }
});
</script>
{% endblock %}
